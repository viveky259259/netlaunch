name: netlaunch_api
description: Firebase service layer for NetLaunch — Functions, Storage, Firestore, Usage, Preferences.
version: 1.0.0
publish_to: 'none'

environment:
  sdk: '>=3.6.0 <4.0.0'
  flutter: '>=3.0.0'

dependencies:
  flutter:
    sdk: flutter
  netlaunch_core:
    path: ../netlaunch_core
  netlaunch_auth:
    path: ../netlaunch_auth
  cloud_firestore: ^5.4.3
  cloud_functions: ^5.1.6
  firebase_storage: ^12.3.4
  file_picker: ^8.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
