name: netlaunch_ui
description: Shared UI widgets and theme for NetLaunch. Depends on netlaunch_core for models.
version: 1.0.0
publish_to: 'none'

environment:
  sdk: '>=3.6.0 <4.0.0'
  flutter: '>=3.0.0'

dependencies:
  flutter:
    sdk: flutter
  netlaunch_core:
    path: ../netlaunch_core
  flutterkit:
    git:
      url: https://github.com/ff-vivek/flutter_kit.git
  intl: ^0.19.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
