name: firebase_hosting_service
description: Firebase Hosting Service - Upload and deploy web projects
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.6.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8

  # Firebase
  firebase_core: ^3.6.0
  firebase_auth: ^5.3.0
  firebase_storage: ^12.3.4
  cloud_firestore: ^5.4.3
  cloud_functions: ^5.1.6
  google_sign_in: ^6.2.1

  # UI Components
  flutterkit:
    git:
      url: https://github.com/ff-vivek/flutter_kit.git
  google_fonts: ^6.1.0

  # UI & State Management
  provider: ^6.1.1

  # File handling
  file_picker: ^8.0.0

  # Utilities
  http: ^1.1.2
  intl: ^0.19.0
  url_launcher: ^6.2.5

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
